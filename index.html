<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>童趣识韵 · 儿童识字</title>
<link href="https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&display=swap" rel="stylesheet">
<style>
:root{--bg:#FFF8F0;--primary:#FF6B6B;--secondary:#FFD93D;--accent:#6BCB77;--blue:#4D96FF;--purple:#C77DFF;--orange:#FF9A3C;--text:#3D2C2C;--text-light:#9B8B8B;--shadow:0 8px 32px rgba(255,107,107,0.12);--radius:20px}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'ZCOOL KuaiLe',cursive;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(circle at 10% 20%,rgba(255,107,107,0.08) 0%,transparent 40%),radial-gradient(circle at 90% 80%,rgba(77,150,255,0.08) 0%,transparent 40%);pointer-events:none}
.deco-float{position:fixed;pointer-events:none;z-index:0;animation:floatAround 8s ease-in-out infinite;font-size:26px;opacity:0.15}
.deco-float:nth-child(1){top:8%;left:5%}.deco-float:nth-child(2){top:15%;right:8%;animation-delay:1.5s}.deco-float:nth-child(3){bottom:20%;left:3%;animation-delay:3s}.deco-float:nth-child(4){bottom:10%;right:5%;animation-delay:4.5s}
@keyframes floatAround{0%,100%{transform:translateY(0) rotate(0deg)}50%{transform:translateY(-12px) rotate(5deg)}}
#app{max-width:480px;margin:0 auto;min-height:100vh;position:relative;z-index:1;display:flex;flex-direction:column}
.top-bar{padding:14px 18px 8px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:rgba(255,248,240,0.95);backdrop-filter:blur(12px);z-index:50}
.app-logo{display:flex;align-items:center;gap:8px}
.logo-icon{width:38px;height:38px;background:linear-gradient(135deg,var(--primary),var(--orange));border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;box-shadow:0 4px 12px rgba(255,107,107,0.3)}
.app-title{font-size:18px;background:linear-gradient(135deg,var(--primary),var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:1px}
.streak-badge{background:linear-gradient(135deg,var(--secondary),var(--orange));border-radius:14px;padding:4px 10px;font-size:11px;color:#5a3a00;font-weight:700;box-shadow:0 2px 8px rgba(255,217,61,0.4)}
.page{display:none;flex:1;padding:0 14px 90px}.page.active{display:block;animation:pageIn 0.35s ease-out}
@keyframes pageIn{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:rgba(255,255,255,0.92);backdrop-filter:blur(16px);border-top:2px solid rgba(255,107,107,0.1);display:flex;padding:5px 0 12px;z-index:100}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;padding:5px 0;border:none;background:none;font-family:inherit}
.nav-icon{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;transition:all 0.3s}
.nav-item.active .nav-icon{background:linear-gradient(135deg,var(--primary),var(--orange));box-shadow:0 4px 16px rgba(255,107,107,0.4);transform:scale(1.08) translateY(-3px)}
.nav-label{font-size:10px;color:var(--text-light)}.nav-item.active .nav-label{color:var(--primary);font-weight:700}
.home-header{text-align:center;padding:4px 0 12px}.home-greeting{font-size:13px;color:var(--text-light);margin-bottom:2px}.home-subtitle{font-size:22px}
.home-subtitle span{background:linear-gradient(135deg,var(--primary),var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.progress-strip{background:white;border-radius:10px;padding:10px 14px;margin-bottom:12px;box-shadow:var(--shadow);display:flex;align-items:center;gap:10px}
.progress-bar-wrap{height:6px;background:#F0E8E8;border-radius:6px;overflow:hidden;flex:1}
.progress-bar-fill{height:100%;background:linear-gradient(90deg,var(--primary),var(--orange));border-radius:6px;transition:width 0.6s ease}
.progress-count{font-size:22px;font-weight:700;color:var(--primary)}.progress-count small{font-size:11px;color:var(--text-light)}
.section-title{font-size:13px;color:var(--text-light);margin-bottom:10px;padding-left:4px;display:flex;align-items:center;gap:6px}
.section-title::before{content:'';width:3px;height:14px;background:linear-gradient(var(--primary),var(--orange));border-radius:3px}
.category-tabs{display:flex;gap:6px;margin-bottom:12px;overflow-x:auto;padding-bottom:4px;flex-wrap:wrap;justify-content:center}
.category-tab{padding:6px 12px;border-radius:16px;border:2px solid rgba(255,107,107,0.2);background:white;font-family:inherit;font-size:12px;color:var(--text);cursor:pointer;transition:all 0.2s;white-space:nowrap}
.category-tab:hover{border-color:var(--primary)}
.category-tab.active{background:linear-gradient(135deg,var(--primary),var(--orange));color:white;border-color:transparent}
.char-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;margin-bottom:14px}
.char-card{aspect-ratio:1;background:white;border-radius:8px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,0.04);border:2px solid transparent;transition:all 0.2s;position:relative}
.char-card:hover{transform:translateY(-2px);box-shadow:0 6px 16px rgba(255,107,107,0.15);border-color:var(--primary)}
.char-card.learned{background:linear-gradient(135deg,#FFF0F0,#FFF8E8);border-color:var(--accent)}
.char-card.learned::after{content:'✓';position:absolute;top:2px;right:3px;font-size:8px;color:var(--accent)}
.char-main{font-size:22px;line-height:1;margin-bottom:1px}.char-card:hover .char-main{transform:scale(1.1)}
.char-pinyin{font-size:8px;color:var(--text-light);font-family:sans-serif}
.learn-back{display:flex;align-items:center;gap:6px;color:var(--text-light);font-size:13px;padding:4px 0 10px;border:none;background:none;font-family:inherit;cursor:pointer}
.learn-back:hover{color:var(--primary)}
.learn-card{background:white;border-radius:var(--radius);padding:24px 16px;text-align:center;box-shadow:var(--shadow);margin-bottom:12px}
.learn-char-big{font-size:88px;line-height:1;margin-bottom:8px;display:block;animation:charPop 0.4s ease-out;cursor:pointer;transition:transform 0.2s}
.learn-char-big:hover{transform:scale(1.05)}
@keyframes charPop{from{transform:scale(0.5);opacity:0}to{transform:scale(1);opacity:1}}
.learn-pinyin-big{font-size:22px;color:var(--primary);margin-bottom:6px;font-family:sans-serif}
.learn-meaning{font-size:14px;color:var(--text-light);line-height:1.4}
.speak-hint{font-size:10px;color:var(--text-light);margin-top:6px;opacity:0.6}
.words-section{background:white;border-radius:var(--radius);padding:14px;box-shadow:var(--shadow);margin-bottom:12px}
.words-title{font-size:13px;color:var(--text-light);margin-bottom:10px}
.words-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.word-chip{background:linear-gradient(135deg,#FFF5F5,#FFF0E8);border:2px solid rgba(255,107,107,0.15);border-radius:8px;padding:6px 10px;text-align:center;cursor:pointer;transition:all 0.2s}
.word-chip:hover{transform:scale(1.03);border-color:var(--primary)}
.word-text{font-size:16px;color:var(--text);display:block}
.btn-learned{width:100%;padding:14px;border-radius:10px;border:none;font-family:inherit;font-size:16px;cursor:pointer;transition:all 0.25s}
.btn-learned.not-learned{background:linear-gradient(135deg,var(--primary),var(--orange));color:white;box-shadow:0 5px 16px rgba(255,107,107,0.4)}
.btn-learned.is-learned{background:linear-gradient(135deg,var(--accent),#4CAF50);color:white}
.btn-reset{width:100%;padding:12px;border-radius:10px;border:2px solid rgba(255,107,107,0.3);background:white;font-family:inherit;font-size:14px;color:var(--primary);cursor:pointer;transition:all 0.2s;margin-top:10px}
.btn-reset:hover{background:#FFF0F0;border-color:var(--primary)}
.game-header{text-align:center;padding:4px 0 12px}.game-title-big{font-size:22px}
.game-cards-row{display:flex;flex-direction:column;gap:10px;margin-bottom:14px}
.game-mode-card{background:white;border-radius:14px;padding:14px 16px;display:flex;align-items:center;gap:12px;box-shadow:var(--shadow);cursor:pointer;transition:all 0.25s;border:2px solid transparent}
.game-mode-card:hover{transform:translateY(-2px);box-shadow:0 10px 28px rgba(255,107,107,0.12);border-color:var(--primary)}
.game-mode-icon{width:48px;height:48px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:24px}
.game-mode-icon.red{background:linear-gradient(135deg,#FFE0E0,#FFD0D0)}
.game-mode-icon.yellow{background:linear-gradient(135deg,#FFF5CC,#FFE8A0)}
.game-mode-icon.blue{background:linear-gradient(135deg,#D0E8FF,#B8D8FF)}
.game-mode-info{flex:1}.game-mode-name{font-size:16px;margin-bottom:2px}.game-mode-desc{font-size:11px;color:var(--text-light);font-family:sans-serif}
.game-badge{padding:3px 8px;border-radius:12px;font-size:9px;font-weight:700;font-family:sans-serif;background:#E8FFE8;color:var(--accent)}
.quiz-area{display:none}.quiz-area.active{display:block;animation:pageIn 0.35s ease-out}
.quiz-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.quiz-back-btn{display:flex;align-items:center;gap:5px;color:var(--text-light);font-size:12px;border:none;background:none;font-family:inherit;cursor:pointer}
.quiz-score-display{font-size:13px;color:var(--primary);font-weight:700}
.quiz-progress-bar{height:5px;background:#F0E8E8;border-radius:5px;margin-bottom:12px;overflow:hidden}
.quiz-progress-fill{height:100%;background:linear-gradient(90deg,var(--primary),var(--orange));border-radius:5px;transition:width 0.4s ease}
.quiz-question-card{background:white;border-radius:var(--radius);padding:20px 16px;text-align:center;box-shadow:var(--shadow);margin-bottom:12px}
.quiz-q-label{font-size:11px;color:var(--text-light);margin-bottom:8px;font-family:sans-serif}
.quiz-question-text{font-size:16px;line-height:1.4}
.quiz-question-text .highlight{color:var(--primary);font-size:20px;cursor:pointer}
.quiz-options{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.quiz-option{background:white;border:2px solid rgba(0,0,0,0.08);border-radius:10px;padding:14px 8px;font-size:28px;text-align:center;cursor:pointer;transition:all 0.2s;box-shadow:0 2px 8px rgba(0,0,0,0.04);font-family:inherit}
.quiz-option:hover:not(.disabled){transform:scale(1.03);border-color:var(--blue)}
.quiz-option.correct{background:linear-gradient(135deg,#E8FFE8,#D0FFD8);border-color:var(--accent)}
.quiz-option.wrong{background:linear-gradient(135deg,#FFE8E8,#FFD0D0);border-color:var(--primary);animation:shake 0.3s}
.quiz-option.disabled{cursor:not-allowed}
@keyframes shake{0%,100%{transform:translateX(0)}50%{transform:translateX(-5px)}}
.match-area{display:flex;flex-direction:column;gap:12px}
.match-item{background:white;border:2px solid rgba(0,0,0,0.08);border-radius:10px;padding:12px 14px;font-size:16px;text-align:center;cursor:pointer;transition:all 0.2s;box-shadow:0 2px 8px rgba(0,0,0,0.04)}
.match-item.selected{border-color:var(--blue);background:linear-gradient(135deg,#E8F0FF,#D8E8FF)}
.match-item.matched{border-color:var(--accent);background:linear-gradient(135deg,#E8FFE8,#D0FFD8);pointer-events:none}
.match-item.wrong-match{animation:shake 0.3s}
.match-divider{text-align:center;color:var(--text-light);font-size:20px;padding:4px 0}
.quiz-result-card{background:white;border-radius:var(--radius);padding:24px 18px;text-align:center;box-shadow:var(--shadow);display:none}
.quiz-result-card.show{display:block;animation:pageIn 0.4s ease-out}
.result-emoji{font-size:48px;margin-bottom:8px;display:block}
.result-title{font-size:22px;margin-bottom:4px}
.result-score{font-size:14px;color:var(--text-light);margin-bottom:16px;font-family:sans-serif}
.result-score span{color:var(--primary);font-size:28px;font-family:inherit}
.btn-primary{display:inline-block;padding:10px 24px;background:linear-gradient(135deg,var(--primary),var(--orange));color:white;border-radius:10px;font-size:15px;cursor:pointer;border:none;font-family:inherit;box-shadow:0 4px 14px rgba(255,107,107,0.4)}
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.stat-card{background:white;border-radius:10px;padding:14px 10px;text-align:center;box-shadow:var(--shadow);position:relative;overflow:hidden}
.stat-card::before{content:'';position:absolute;bottom:-12px;right:-12px;width:50px;height:50px;border-radius:50%;opacity:0.08}
.stat-card.red::before{background:var(--primary)}.stat-card.blue::before{background:var(--blue)}.stat-card.green::before{background:var(--accent)}.stat-card.yellow::before{background:var(--secondary)}
.stat-icon{font-size:22px;margin-bottom:4px;display:block}
.stat-value{font-size:24px;line-height:1;margin-bottom:2px}
.stat-value.red{color:var(--primary)}.stat-value.blue{color:var(--blue)}.stat-value.green{color:var(--accent)}.stat-value.yellow{color:var(--orange)}
.stat-label{font-size:10px;color:var(--text-light);font-family:sans-serif}
.learned-chars-section{background:white;border-radius:var(--radius);padding:14px;box-shadow:var(--shadow);margin-bottom:12px}
.learned-chars-title{font-size:14px;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.learned-chars-grid{display:flex;flex-wrap:wrap;gap:6px;max-height:240px;overflow-y:auto}
.learned-char-badge{background:linear-gradient(135deg,#FFF0F0,#FFF8E8);border:2px solid rgba(107,203,119,0.3);border-radius:6px;padding:5px 8px;font-size:16px;display:flex;align-items:center;gap:3px;cursor:pointer;transition:transform 0.2s}
.learned-char-badge:hover{transform:scale(1.05)}
.learned-char-badge .check{font-size:9px;color:var(--accent)}
.empty-state{text-align:center;padding:20px 0;color:var(--text-light);font-size:13px}
.empty-state .empty-icon{font-size:36px;display:block;margin-bottom:8px}
#celebration{position:fixed;inset:0;z-index:1000;pointer-events:none;display:none}
#celebration.show{display:block}
.celebration-overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;pointer-events:all;background:rgba(0,0,0,0.3)}
.celebration-card{background:white;border-radius:20px;padding:28px 36px;text-align:center;box-shadow:0 16px 48px rgba(0,0,0,0.18);animation:celebIn 0.5s ease-out;z-index:2}
@keyframes celebIn{from{transform:scale(0.4);opacity:0}to{transform:scale(1);opacity:1}}
.celeb-char{font-size:56px;display:block;margin-bottom:4px}
.celeb-title{font-size:22px;margin-bottom:3px}
.celeb-sub{font-size:13px;color:var(--text-light);font-family:sans-serif}
.star-particle{position:absolute;font-size:18px;animation:starFly 1.2s ease-out forwards;pointer-events:none}
@keyframes starFly{0%{transform:translate(0,0) scale(0);opacity:1}100%{transform:translate(var(--tx),var(--ty)) scale(1.3);opacity:0}}
/* 确认弹窗 */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:1001;display:none;justify-content:center;align-items:center}
.modal-overlay.show{display:flex}
.modal-card{background:white;border-radius:20px;padding:24px 28px;text-align:center;box-shadow:0 16px 48px rgba(0,0,0,0.2);max-width:300px;animation:celebIn 0.3s ease-out}
.modal-title{font-size:18px;margin-bottom:8px}
.modal-text{font-size:14px;color:var(--text-light);margin-bottom:20px;font-family:sans-serif}
.modal-btns{display:flex;gap:10px}
.modal-btn{flex:1;padding:10px;border-radius:10px;border:none;font-family:inherit;font-size:14px;cursor:pointer}
.modal-btn.cancel{background:#F0E8E8;color:var(--text)}
.modal-btn.confirm{background:linear-gradient(135deg,var(--primary),var(--orange));color:white}
@media(max-width:360px){.char-grid{grid-template-columns:repeat(4,1fr)}.char-main{font-size:18px}}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:rgba(255,107,107,0.25);border-radius:3px}
</style>
</head>
<body>
<span class="deco-float">🌟</span><span class="deco-float">🌈</span><span class="deco-float">🎈</span><span class="deco-float">🦋</span>
<div id="app">
<div class="top-bar"><div class="app-logo"><div class="logo-icon">📖</div><div class="app-title">童趣识韵</div></div><div class="streak-badge">🔥 <span id="streak-days">0</span> 天</div></div>
<div class="page active" id="page-home"><div class="home-header"><div class="home-greeting">今天也要好好学习哦～</div><div class="home-subtitle">认识更多<span>汉字</span>吧！</div></div><div class="progress-strip"><div class="progress-bar-wrap"><div class="progress-bar-fill" id="home-progress-bar"></div></div><div class="progress-count"><span id="home-learned-count">0</span><small id="total-count">/400</small></div></div><div class="section-title">选择分类</div><div class="category-tabs" id="category-tabs"></div><div class="char-grid" id="char-grid"></div></div>
<div class="page" id="page-learn"><button class="learn-back" onclick="goBack()">← 返回首页</button><div class="learn-card"><span class="learn-char-big" id="learn-char" onclick="speakChar()">日</span><div class="learn-pinyin-big" id="learn-pinyin">rì</div><div class="learn-meaning" id="learn-meaning">太阳</div><div class="speak-hint">👆 点击汉字听读音</div></div><div class="words-section"><div class="words-title">📝 组词练习</div><div class="words-grid" id="words-grid"></div></div><button class="btn-learned not-learned" id="btn-learned" onclick="toggleLearned()">⭐ 我学会了！</button></div>
<div class="page" id="page-game"><div class="game-header"><div class="game-title-big">🎮 趣味游戏</div></div><div id="game-select"><div class="game-cards-row"><div class="game-mode-card" onclick="startQuiz('puzzle')"><div class="game-mode-icon red">🧩</div><div class="game-mode-info"><div class="game-mode-name">拼字游戏</div><div class="game-mode-desc">看释义，选正确汉字</div></div><span class="game-badge">已上线</span></div><div class="game-mode-card" onclick="startQuiz('match')"><div class="game-mode-icon yellow">🎯</div><div class="game-mode-info"><div class="game-mode-name">字义配对</div><div class="game-mode-desc">连线配对汉字与释义</div></div><span class="game-badge">已上线</span></div><div class="game-mode-card" onclick="startQuiz('listen')"><div class="game-mode-icon blue">👂</div><div class="game-mode-info"><div class="game-mode-name">听音选字</div><div class="game-mode-desc">听拼音，找对应汉字</div></div><span class="game-badge">已上线</span></div></div></div><div class="quiz-area" id="quiz-area"></div></div>
<div class="page" id="page-progress"><div class="home-header"><div class="home-subtitle">我的<span>学习</span>记录</div></div><div class="stats-grid"><div class="stat-card red"><span class="stat-icon">📚</span><div class="stat-value red" id="stat-learned">0</div><div class="stat-label">已学汉字</div></div><div class="stat-card blue"><span class="stat-icon">🎯</span><div class="stat-value blue" id="stat-total">400</div><div class="stat-label">总字数</div></div><div class="stat-card green"><span class="stat-icon">🔥</span><div class="stat-value green" id="stat-streak">0</div><div class="stat-label">连续天数</div></div><div class="stat-card yellow"><span class="stat-icon">⭐</span><div class="stat-value yellow" id="stat-stars">0</div><div class="stat-label">获得星星</div></div></div><div class="learned-chars-section"><div class="learned-chars-title">🏆 已学会的汉字</div><div class="learned-chars-grid" id="learned-chars-grid"></div></div><button class="btn-reset" onclick="showResetModal()">🔄 重新学习（清除记录）</button></div>
<nav class="bottom-nav"><button class="nav-item active" onclick="switchPage('home',this)"><div class="nav-icon">🏠</div><span class="nav-label">首页</span></button><button class="nav-item" onclick="switchPage('game',this)"><div class="nav-icon">🎮</div><span class="nav-label">游戏</span></button><button class="nav-item" onclick="switchPage('progress',this)"><div class="nav-icon">📊</div><span class="nav-label">进度</span></button></nav>
</div>
<div id="celebration"><div class="celebration-overlay" onclick="hideCelebration()"><div class="celebration-card"><span class="celeb-char" id="celeb-char">🌟</span><div class="celeb-title" id="celeb-title">太棒了！</div><div class="celeb-sub" id="celeb-sub">你学会了这个字！</div></div></div></div>

function openLearn(c){state.currentChar=c.char;document.getElementById('learn-char').textContent=c.char;document.getElementById('learn-pinyin').textContent=c.pinyin;document.getElementById('learn-meaning').textContent=c.meaning;var wordsGrid=document.getElementById('words-grid');wordsGrid.innerHTML='';var words=getWords(c);words.forEach(function(w){var chip=document.createElement('div');chip.className='word-chip';chip.innerHTML='<span class="word-text">'+w+'</span>';chip.onclick=function(){speak(w)};wordsGrid.appendChild(chip)});var btn=document.getElementById('btn-learned');if(state.learned.includes(c.char)){btn.className='btn-learned is-learned';btn.textContent='\u2713 已掌握！'}else{btn.className='btn-learned not-learned';btn.textContent='\u2b50 我学会了！'}switchPage('learn',null);setTimeout(function(){speak(c.char)},100)}
function goBack(){switchPage('home',document.querySelector('.nav-item'))}
function toggleLearned(){const char=state.currentChar;if(!char||state.learned.includes(char))return;state.learned.push(char);state.stars++;const today=new Date().toDateString();if(state.lastLearnDate!==today){const diff=state.lastLearnDate?Math.floor((new Date()-new Date(state.lastLearnDate))/86400000):999;state.streakDays=diff<=1?state.streakDays+1:1;state.lastLearnDate=today}saveState();updateStreak();document.getElementById('btn-learned').className='btn-learned is-learned';document.getElementById('btn-learned').textContent='✓ 已掌握！';showCelebration(char);renderHome();renderProgress()}
function showCelebration(char){const celeb=document.getElementById('celebration');document.getElementById('celeb-char').textContent=char;document.getElementById('celeb-title').textContent='太棒了！🎉';document.getElementById('celeb-sub').textContent=`你学会了「${char}」这个字！`;celeb.classList.add('show');const overlay=celeb.querySelector('.celebration-overlay');for(let i=0;i<16;i++){const star=document.createElement('div');star.className='star-particle';star.textContent=['⭐','🌟','✨','💫'][Math.floor(Math.random()*4)];const angle=Math.random()*360*Math.PI/180,dist=100+Math.random()*150;star.style.cssText=`left:45%;top:45%;--tx:${Math.cos(angle)*dist}px;--ty:${Math.sin(angle)*dist}px;animation-delay:${Math.random()*0.3}s`;overlay.appendChild(star)}setTimeout(hideCelebration,2500)}
function hideCelebration(){document.getElementById('celebration').classList.remove('show');document.querySelectorAll('.star-particle').forEach(s=>s.remove())}
function renderProgress(){document.getElementById('stat-learned').textContent=state.learned.length;document.getElementById('stat-streak').textContent=state.streakDays;document.getElementById('stat-stars').textContent=state.stars;const grid=document.getElementById('learned-chars-grid');if(state.learned.length===0){grid.innerHTML='<div class="empty-state"><span class="empty-icon">🌱</span>快去学习第一个汉字吧！</div>'}else{grid.innerHTML='';state.learned.forEach(char=>{const badge=document.createElement('div');badge.className='learned-char-badge';badge.innerHTML=`${char}<span class="check">✓</span>`;badge.onclick=()=>{const c=CHARS.find(x=>x.char===char);if(c)openLearn(c)};grid.appendChild(badge)})}}
function updateStreak(){document.getElementById('streak-days').textContent=state.streakDays}
function showResetModal(){document.getElementById('reset-modal').classList.add('show')}
function hideResetModal(){document.getElementById('reset-modal').classList.remove('show')}
function resetProgress(){state={learned:[],streakDays:0,lastLearnDate:null,stars:0,currentChar:null,cat:0};saveState();hideResetModal();renderHome();renderProgress();updateStreak();alert('学习记录已清除！')}
function switchPage(name,navEl){document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));document.getElementById('page-'+name).classList.add('active');if(navEl){document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));navEl.classList.add('active')}if(name==='game'){document.getElementById('game-select').style.display='';document.getElementById('quiz-area').classList.remove('active')}if(name==='progress')renderProgress();if(name==='home')renderHome()}
let quizState={questions:[],current:0,score:0,answered:false,type:'',matchSelected:null,matched:[]};
function startQuiz(type){quizState={questions:[],current:0,score:0,answered:false,type,matchSelected:null,matched:[]};document.getElementById('game-select').style.display='none';document.getElementById('quiz-area').classList.add('active');if(type==='puzzle')startPuzzle();else if(type==='match')startMatch();else if(type==='listen')startListen()}
function startPuzzle(){quizState.questions=[...CHARS].sort(()=>Math.random()-0.5).slice(0,10);renderPuzzleQuestion()}
function renderPuzzleQuestion(){const q=quizState.questions[quizState.current],total=quizState.questions.length;document.getElementById('quiz-area').innerHTML=`<div class="quiz-header"><button class="quiz-back-btn" onclick="endQuiz()">← 返回</button><div class="quiz-score-display">得分: ${quizState.score}/${total}</div></div><div class="quiz-progress-bar"><div class="quiz-progress-fill" style="width:${quizState.current/total*100}%"></div></div><div class="quiz-question-card"><div class="quiz-q-label">第 ${quizState.current+1} 题 / 共 ${total} 题</div><div class="quiz-question-text">下面哪个字的意思是<br><span class="highlight">${q.meaning}</span>？</div></div><div class="quiz-options" id="quiz-options"></div>`;const options=[q,...CHARS.filter(c=>c.char!==q.char).sort(()=>Math.random()-0.5).slice(0,3)].sort(()=>Math.random()-0.5);const optsEl=document.getElementById('quiz-options');options.forEach(opt=>{const btn=document.createElement('div');btn.className='quiz-option';btn.textContent=opt.char;btn.onclick=()=>answerQuiz(btn,opt.char===q.char,q.char,'puzzle');optsEl.appendChild(btn)});quizState.answered=false}
function startListen(){quizState.questions=[...CHARS].sort(()=>Math.random()-0.5).slice(0,10);renderListenQuestion()}
function renderListenQuestion(){const q=quizState.questions[quizState.current],total=quizState.questions.length;document.getElementById('quiz-area').innerHTML=`<div class="quiz-header"><button class="quiz-back-btn" onclick="endQuiz()">← 返回</button><div class="quiz-score-display">得分: ${quizState.score}/${total}</div></div><div class="quiz-progress-bar"><div class="quiz-progress-fill" style="width:${quizState.current/total*100}%"></div></div><div class="quiz-question-card"><div class="quiz-q-label">第 ${quizState.current+1} 题 / 共 ${total} 题</div><div class="quiz-question-text">请点击 🔊 听拼音，然后选择正确的汉字<br><span class="highlight" onclick="speak('${q.pinyin}')">🔊 ${q.pinyin}</span></div></div><div class="quiz-options" id="quiz-options"></div>`;const options=[q,...CHARS.filter(c=>c.char!==q.char).sort(()=>Math.random()-0.5).slice(0,3)].sort(()=>Math.random()-0.5);const optsEl=document.getElementById('quiz-options');options.forEach(opt=>{const btn=document.createElement('div');btn.className='quiz-option';btn.textContent=opt.char;btn.onclick=()=>answerQuiz(btn,opt.char===q.char,q.char,'listen');optsEl.appendChild(btn)});quizState.answered=false;setTimeout(()=>speak(q.pinyin),500)}
function answerQuiz(btn,isCorrect,correctChar,quizType){if(quizState.answered)return;quizState.answered=true;document.querySelectorAll('.quiz-option').forEach(b=>b.classList.add('disabled'));if(isCorrect){btn.classList.add('correct');quizState.score++;speak(correctChar)}else{btn.classList.add('wrong');document.querySelectorAll('.quiz-option').forEach(b=>{if(b.textContent===correctChar){b.classList.add('correct');speak(correctChar)}})}setTimeout(()=>{quizState.current++;if(quizState.current>=quizState.questions.length)showResult();else{if(quizType==='listen')renderListenQuestion();else renderPuzzleQuestion()}},1000)}
function startMatch(){quizState.questions=[...CHARS].sort(()=>Math.random()-0.5).slice(0,5);quizState.matched=[];quizState.matchSelected=null;renderMatchQuestion()}
function renderMatchQuestion(){const items=quizState.questions;document.getElementById('quiz-area').innerHTML=`<div class="quiz-header"><button class="quiz-back-btn" onclick="endQuiz()">← 返回</button><div class="quiz-score-display">已配对: ${quizState.matched.length}/${items.length}</div></div><div class="quiz-question-card"><div class="quiz-q-label">字义配对：点击汉字和对应的释义进行配对</div></div><div class="match-area"><div class="match-column" id="match-chars"></div><div class="match-divider">⇅</div><div class="match-column" id="match-meanings"></div></div>`;const charsEl=document.getElementById('match-chars');const meaningsEl=document.getElementById('match-meanings');const shuffledChars=[...items].sort(()=>Math.random()-0.5);const shuffledMeanings=[...items].sort(()=>Math.random()-0.5);shuffledChars.forEach(item=>{const div=document.createElement('div');div.className='match-item'+(quizState.matched.includes(item.char)?' matched':'');div.textContent=item.char;div.dataset.char=item.char;div.dataset.type='char';if(!quizState.matched.includes(item.char))div.onclick=()=>selectMatch(div);charsEl.appendChild(div)});shuffledMeanings.forEach(item=>{const div=document.createElement('div');div.className='match-item'+(quizState.matched.includes(item.char)?' matched':'');div.textContent=item.meaning;div.dataset.char=item.char;div.dataset.type='meaning';if(!quizState.matched.includes(item.char))div.onclick=()=>selectMatch(div);meaningsEl.appendChild(div)})}
function selectMatch(el){if(quizState.matched.includes(el.dataset.char))return;if(!quizState.matchSelected){quizState.matchSelected=el;el.classList.add('selected');if(el.dataset.type==='char')speak(el.dataset.char)}else{if(quizState.matchSelected.dataset.char===el.dataset.char){quizState.matchSelected.classList.remove('selected');quizState.matchSelected.classList.add('matched');el.classList.add('matched');quizState.matched.push(el.dataset.char);quizState.score=quizState.matched.length;speak(el.dataset.char);if(quizState.matched.length>=quizState.questions.length)setTimeout(showResult,500)}else{el.classList.add('wrong-match');quizState.matchSelected.classList.add('wrong-match');setTimeout(()=>{el.classList.remove('wrong-match');quizState.matchSelected.classList.remove('wrong-match');quizState.matchSelected.classList.remove('selected');quizState.matchSelected=null},400)}quizState.matchSelected=null}}
function showResult(){const score=quizState.score,total=quizState.questions.length;let emoji,title;if(score===total){emoji='🏆';title='完美！全对了！'}else if(score>=total*0.8){emoji='🎉';title='太棒了！'}else if(score>=total*0.6){emoji='😊';title='不错哦！'}else{emoji='💪';title='继续加油！'}document.getElementById('quiz-area').innerHTML=`<div class="quiz-result-card show"><span class="result-emoji">${emoji}</span><div class="result-title">${title}</div><div class="result-score">答对了 <span>${score}</span> / ${total} 题</div><button class="btn-primary" onclick="startQuiz('${quizState.type}')">再玩一次 🔄</button></div>`}
function endQuiz(){document.getElementById('game-select').style.display='';document.getElementById('quiz-area').classList.remove('active')}
init();
</script>
